<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>999CLUB</title>

    <style>
        body {
            margin: 0;
            background-color: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            height: 100vh;
            gap: 20px;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        button {
            width: 250px;
            padding: 15px;
            font-size: 20px;

            border: none;
            border-radius: 10px;

            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .youtube-btn {
            background-color: #ff0000;
        }

        .youtube-btn:hover {
            background-color: #cc0000;
        }

        .simpleware-btn {
            background-color: #5865F2;
        }

        .simpleware-btn:hover {
            background-color: #4752C4;
        }
    </style>
</head>

<body>

    <h1>999CLUB</h1>

    <button 
        class="youtube-btn"
        onclick="window.location.href='https://www.youtube.com/@official999club'">
        YouTube
    </button>

    <button 
        class="simpleware-btn"
        onclick="window.location.href='https://link-target.net/337328/9ware-20-2460'">
        Simpleware
    </button>

</body>
</html>
