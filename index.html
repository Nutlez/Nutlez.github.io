<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simpleware</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 48px;
            text-align: center;
            letter-spacing: 2px;
        }

        .center-button {
            margin-bottom: 40px;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #5865F2;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background-color: #4752C4;
        }
    </style>
</head>
<body>

    <h1>simpleware</h1>

    <div class="center-button">
        <button onclick="window.location.href='https://discord.gg/wwnKeJ7m'">
            Dołącz na Discord
        </button>
    </div>

</body>
</html>
